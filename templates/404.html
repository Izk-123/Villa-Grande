{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta content="width=device-width, initial-scale=1.0" name="viewport">
  <title>Page Not Found | Villa Grande</title>
  <link href="https://fonts.gstatic.com" rel="preconnect">
  <link href="https://fonts.googleapis.com/css?family=Open+Sans:300,300i,400,400i,600,600i,700,700i|Nunito:300,300i,400,400i,600,600i,700,700i|Poppins:300,300i,400,400i,500,500i,600,600i,700,700i" rel="stylesheet">
  <link href="{% static 'admin/vendor/bootstrap/css/bootstrap.min.css' %}" rel="stylesheet">
  <link href="{% static 'admin/vendor/bootstrap-icons/bootstrap-icons.css' %}" rel="stylesheet">
  <link href="{% static 'admin/css/style.css' %}" rel="stylesheet">
  <link href="{% static 'admin/css/custom_admin.css' %}" rel="stylesheet">
  <style>
    body {
      background: var(--vg-cream);
      font-family: 'Jost', sans-serif;
    }
    .error-404 {
      text-align: center;
      padding: 40px;
    }
    .error-404 h1 {
      font-size: 180px;
      font-weight: 700;
      color: var(--vg-gold);
      margin-bottom: 0;
      line-height: 150px;
    }
    .error-404 h2 {
      font-size: 24px;
      font-weight: 700;
      color: var(--vg-navy);
      margin-bottom: 30px;
    }
    .error-404 .btn {
      background: var(--vg-navy);
      color: var(--vg-white);
      padding: 10px 30px;
      border-radius: 5px;
      text-decoration: none;
      transition: var(--vg-transition);
    }
    .error-404 .btn:hover {
      background: var(--vg-gold);
      color: var(--vg-navy);
    }
    .error-404 img {
      max-width: 50%;
    }
  </style>
</head>
<body>
  <main>
    <div class="container">
      <section class="error-404 min-vh-100 d-flex flex-column align-items-center justify-content-center py-4">
        <h1>404</h1>
        <h2>Page Not Found</h2>
        <p>The page you are looking for doesn't exist or has been moved.</p>
        <a class="btn mt-3" href="{% url 'lodge:home' %}">
          <i class="bi bi-house-door"></i> Back to Home
        </a>
        <img src="{% static 'admin/img/not-found.svg' %}" class="img-fluid py-5" alt="Page Not Found">
        <div class="credits">
          &copy; Copyright <strong><span>Villa Grande Lodge</span></strong>. All Rights Reserved
        </div>
      </section>
    </div>
  </main>
  <a href="#" class="back-to-top d-flex align-items-center justify-content-center"><i class="bi bi-arrow-up-short"></i></a>
  <script src="{% static 'admin/vendor/bootstrap/js/bootstrap.bundle.min.js' %}"></script>
</body>
</html>
