{% load i18n admin_urls %}
<div class="submit-row d-flex gap-2 mt-4 flex-wrap">
    {% if show_save %}<input type="submit" value="{% trans 'Save' %}" class="btn btn-primary" name="_save">{% endif %}
    {% if show_save_and_add_another %}<input type="submit" value="{% trans 'Save and add another' %}" class="btn btn-outline-primary" name="_addanother">{% endif %}
    {% if show_save_and_continue %}<input type="submit" value="{% if can_change %}{% trans 'Save and continue editing' %}{% else %}{% trans 'Save and view' %}{% endif %}" class="btn btn-outline-primary" name="_continue">{% endif %}
    {% if show_close %}<a href="{% url opts|admin_urlname:'changelist' %}" class="btn btn-secondary">{% trans 'Close' %}</a>{% endif %}
    {% if show_delete_link and original %}
        <a href="{% url opts|admin_urlname:'delete' original.pk|admin_urlquote %}" class="btn btn-danger ms-auto">{% trans "Delete" %}</a>
    {% endif %}
</div>
