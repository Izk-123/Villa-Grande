{% extends 'lodge/admin/base_admin.html' %}
{% load static %}

{% block title %}Logged Out - Villa Grande CMS{% endblock %}

{% block content %}
<div class="login-container">
    <div class="login-card" style="text-align: center;">
        <div class="login-logo">
            <svg viewBox="0 0 80 80" xmlns="http://www.w3.org/2000/svg">
                <polyline points="8,14 40,66 72,14" fill="none" stroke="#C9A84C" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
                <polyline points="16,14 40,54 64,14" fill="none" stroke="#C9A84C" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                <path d="M 68,38 A 28,28 0 1,0 40,66 L 40,54 L 54,54" fill="none" stroke="#C9A84C" stroke-width="4" stroke-linecap="round"/>
                <path d="M 62,40 A 20,20 0 1,0 42,62" fill="none" stroke="#C9A84C" stroke-width="2" stroke-linecap="round"/>
            </svg>
            <h2>See You Soon!</h2>
        </div>
        
        <div style="margin: 40px 0;">
            <i class="fas fa-check-circle" style="font-size: 4rem; color: var(--gold);"></i>
            <p style="margin-top: 20px; font-size: 1.1rem;">You have been successfully logged out.</p>
        </div>
        
        <div style="display: flex; gap: 15px; justify-content: center;">
            <a href="{% url 'admin:login' %}" class="btn-admin btn-admin-primary">Login Again</a>
            <a href="/" class="btn-admin btn-admin-outline">Back to Website</a>
        </div>
        
        <div class="login-footer" style="margin-top: 30px;">
            <p>© 2026 Villa Grande Lodge</p>
        </div>
    </div>
</div>
{% endblock %}
