{% load static %}
<nav class="navbar-vg navbar navbar-expand-lg navbar-dark" id="mainNav" aria-label="Main navigation">
    <div class="container">
        <a class="navbar-brand" href="{% url 'lodge:home' %}" aria-label="Home">
            {% if site_settings.logo %}
                <img src="{{ site_settings.logo.url }}" alt="{{ site_settings.site_name }}" height="50" width="auto" loading="lazy">
            {% else %}
                <img src="{% static 'img/VG_Blue.png' %}" alt="Villa Grande Logo" height="50" width="auto" loading="lazy">
            {% endif %}
            <div class="brand-text">
                <span>{{ site_settings.site_name|default:"Villa Grande" }}</span>
                <span>{{ site_settings.tagline|default:"Luxury Lodge" }}</span>
            </div>
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu" aria-label="Toggle navigation" aria-expanded="false" aria-controls="navMenu">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse justify-content-end" id="navMenu">
            <ul class="navbar-nav align-items-lg-center">
                <li class="nav-item"><a class="nav-link {% if request.resolver_match.url_name == 'home' %}active{% endif %}" href="{% url 'lodge:home' %}" {% if request.resolver_match.url_name == 'home' %}aria-current="page"{% endif %}>Home</a></li>
                <li class="nav-item"><a class="nav-link {% if request.resolver_match.url_name == 'about' %}active{% endif %}" href="{% url 'lodge:about' %}" {% if request.resolver_match.url_name == 'about' %}aria-current="page"{% endif %}>About</a></li>
                <li class="nav-item"><a class="nav-link {% if request.resolver_match.url_name == 'services' %}active{% endif %}" href="{% url 'lodge:services' %}" {% if request.resolver_match.url_name == 'services' %}aria-current="page"{% endif %}>Services</a></li>
                <li class="nav-item"><a class="nav-link {% if request.resolver_match.url_name == 'rooms' %}active{% endif %}" href="{% url 'lodge:rooms' %}" {% if request.resolver_match.url_name == 'rooms' %}aria-current="page"{% endif %}>Rooms</a></li>
                <li class="nav-item dropdown">
                    <a class="nav-link dropdown-toggle" href="#" data-bs-toggle="dropdown" aria-expanded="false">Pages</a>
                    <div class="dropdown-menu">
                        <a href="{% url 'lodge:booking' %}" class="dropdown-item">Booking</a>
                        <a href="{% url 'lodge:check_booking' %}" class="dropdown-item">Check Booking</a>
                        <a href="{% url 'lodge:services' %}" class="dropdown-item">Services</a>
                    </div>
                </li>
                <li class="nav-item"><a class="nav-link {% if request.resolver_match.url_name == 'contact' %}active{% endif %}" href="{% url 'lodge:contact' %}" {% if request.resolver_match.url_name == 'contact' %}aria-current="page"{% endif %}>Contact</a></li>
                <li class="nav-item">
                    <a class="nav-link btn-book" href="{% url 'lodge:booking' %}">Reserve Now</a>
                </li>
            </ul>
        </div>
    </div>
</nav>
